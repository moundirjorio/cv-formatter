# Blueprint de déploiement Render — https://render.com
# VERSION GRATUITE (pour tester). Pas de disque persistant : les comptes créés
# et les CV générés sont effacés à chaque redéploiement, et le site s'endort
# après ~15 min d'inactivité (il se réveille en ~30 s à la visite suivante).
#
# Pour passer en production (données conservées) : plan "starter" + bloc "disk"
# + variable DATA_DIR=/var/data. Demande-moi, je réactive tout ça.
#
# Les valeurs « sync: false » sont des SECRETS : tu les saisis dans le tableau
# de bord Render. SESSION_SECRET est généré automatiquement par Render.
services:
  - type: web
    name: cv-formatter
    runtime: python
    plan: free
    region: frankfurt        # proche de la France
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true         # redéploie à chaque push GitHub
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production     # active les cookies Secure (HTTPS)
      - key: SESSION_SECRET
        generateValue: true   # Render génère un secret aléatoire fort
      - key: SESSION_HOURS
        value: "12"
      - key: ANTHROPIC_API_KEY
        sync: false           # ← à saisir dans le dashboard
      - key: CV_API_KEYS
        sync: false           # ← clés API acceptées (change-les)
      - key: LOGIN_USER
        sync: false           # ← identifiant admin
      - key: LOGIN_PASSWORD
        sync: false           # ← mot de passe admin (PAS "changeme")
      - key: CLAUDE_MODEL
        value: claude-opus-4-8
